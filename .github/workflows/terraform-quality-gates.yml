name: terraform-quality-gates

on:
  # Keep this job present on every PR so branch protection can require it.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-quality-gates-${{ github.ref }}
  cancel-in-progress: true

env:
  TERRAFORM_DIR: terraform
  TFLINT_CONFIG: terraform/.tflint.hcl

jobs:
  quality:
    name: TFLint and Checkov
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect Terraform quality-gate changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -Eeuo pipefail
          should_run=false

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            should_run=true
          elif [[ ! "$BASE_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Unable to resolve the pull request base SHA" >&2
            exit 1
          else
            changed_files="$(git diff --name-only "$BASE_SHA"...HEAD)"
            if grep -Eq \
              '^(terraform/|policies/|checkov\.yaml$|\.github/workflows/terraform-quality-gates\.yml$)' \
              <<<"$changed_files"; then
              should_run=true
            fi
          fi

          echo "should_run=$should_run" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: steps.changes.outputs.should_run == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: '3.12'

      - name: Setup TFLint
        if: steps.changes.outputs.should_run == 'true'
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v7

      - name: Install Checkov
        if: steps.changes.outputs.should_run == 'true'
        run: python -m pip install checkov==3.3.8

      - name: Initialize TFLint plugins
        if: steps.changes.outputs.should_run == 'true'
        run: tflint --config "$GITHUB_WORKSPACE/$TFLINT_CONFIG" --init

      - name: Run TFLint on Terraform roots
        if: steps.changes.outputs.should_run == 'true'
        run: |
          set -Eeuo pipefail
          roots=(
            terraform/backend-bootstrap
            terraform/ci-bootstrap
            terraform/audit-trail
            terraform/envs/dev
            terraform/envs/stage
            terraform/envs/prod
            terraform/modules/network
          )
          for root in "${roots[@]}"; do
            echo "==> tflint ${root}"
            tflint --config "$GITHUB_WORKSPACE/$TFLINT_CONFIG" --chdir "$root" -f compact
          done

      - name: Run Checkov
        if: steps.changes.outputs.should_run == 'true'
        run: checkov -d "$TERRAFORM_DIR" --framework terraform --config-file checkov.yaml --skip-download

      - name: No Terraform quality-gate changes
        if: steps.changes.outputs.should_run != 'true'
        run: echo "No Terraform, policy, or quality-gate configuration changes detected."

      - name: Summary
        if: always()
        run: |
          {
            echo "## Terraform Quality Gates"
            echo
            echo "- scanners required: ${{ steps.changes.outputs.should_run }}"
            echo "- TFLint: ${{ steps.changes.outputs.should_run == 'true' && 'executed' || 'not required' }}"
            echo "- Checkov 3.3.8: ${{ steps.changes.outputs.should_run == 'true' && 'executed' || 'not required' }}"
            echo "- AWS credentials: not used"
            echo "- Apply: not executed"
          } >> "$GITHUB_STEP_SUMMARY"
